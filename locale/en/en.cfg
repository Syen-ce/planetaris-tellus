[tips-and-tricks-item-description]
tellus-briefing=[planet=tellus] is a infected planet with bacterias and parasites, pollen in the atmosphere helps [entity=small-wasp] propagate and affect some materials, with more reseach about tellurian technology you could find a solution.\nChlorophyll and Mycelia that can be cultivated using [entity=condensing-agricultural-tower] and processed in the [entity=planetaris-bioassembler].\nYou can't find [entity=iron-ore], [entity=copper-ore], [entity=crude-oil], [entity=coal], and [entity=uranium-ore] there but plants provide alternative ways of producing needed items.\nMost of the items from agriculture come with the added challenge of spoiling over time. Even [item=planetaris-bioengineering-science-pack] has limited lifespan and can't be stockpiled. Also, with pathologics come with the challenge of producing enemies if they spoil, for example [item=planetaris-pathological-science-pack] will explode in [entity=big-wasp].
tellus-bioassembler=[entity=planetaris-bioassembler] allows to create exclusive tellurian processing and materials.\n[entity=planetaris-bioassembler] are alive, they need to be planted with [item=planetaris-bioassembler-seed] on any natural ground. Like all plants[entity=planetaris-bioassembler] die, to revive them feed them [item=nutrients] before they decompose.\n[entity=planetaris-bioassembler] can be placed by [entity=construction-robot].
tellus-roots=Pipes are easly corroded by pollen and tellurian machines can't connect to [entity=pipe], you will need to create [entity=planetaris-root] to transport your fluids. You can fill roots with fluids coming from pipes with [entity=planetaris-root-filler]

