[tips-and-tricks-item-description]
tellus-briefing=[planet=tellus] — заражённая планета с бактериями и паразитами. Пыльца в атмосфере способствует распространению [entity=small-wasp] и разрушает некоторые материалы. Дополнительные исследования теллурианских технологий помогут найти решение.\nХлорофилл и мицелий можно выращивать с помощью [entity=condensing-agricultural-tower] и перерабатывать в [entity=planetaris-bioassembler].\nНа планете отсутствуют [entity=iron-ore], [entity=copper-ore], [entity=crude-oil], [entity=coal] и [entity=uranium-ore], однако растения позволяют получать необходимые ресурсы альтернативными способами.\nБольшинство сельскохозяйственных продуктов со временем портятся. Даже [item=planetaris-bioengineering-science-pack] имеет ограниченный срок хранения. Некоторые патологические материалы при порче создают врагов. Например, [item=planetaris-pathological-science-pack] может взорваться и породить [entity=big-wasp].

tellus-bioassembler=[entity=planetaris-bioassembler] используется для уникальных теллурианских процессов и материалов.\n[entity=planetaris-bioassembler] — живой организм. Его нужно посадить с помощью [item=planetaris-bioassembler-seed] на естественной поверхности. Как и другие растения, он может погибнуть. Чтобы восстановить его, скормите [item=nutrients] до начала разложения.\n[entity=planetaris-bioassembler] может быть размещён [entity=construction-robot].

tellus-roots=Обычные трубы быстро разрушаются из-за пыльцы, а теллурианские машины не могут подключаться к [entity=pipe]. Для транспортировки жидкостей используйте [entity=planetaris-root]. Корни можно наполнять жидкостью из труб с помощью [entity=planetaris-root-filler].

