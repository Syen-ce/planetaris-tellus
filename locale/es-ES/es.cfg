[tips-and-tricks-item-description]
tellus-briefing=[planet=tellus] esta infectado por parásitos y bacterias, polen en la atmósfera hace que [entity=small-wasp] se propaguen y afecte algunos materiales, con más investigación sobre ciencia telluriana puedes encontar una solución.\Clorofila y micelia son cultivadas usando [entity=condensing-agricultural-tower] y procesados en [entity=planetaris-bioassembler].\nNo puedes encontrar [entity=iron-ore], [entity=copper-ore], [entity=crude-oil], [entity=coal], y [entity=uranium-ore] allí, pero las plantas proporcionan formas alternativas de producir los objetos necesarios.\nLa mayoría de los productos agrícolas vienen con el desafío añadido de que se degradan con el tiempo. Incluso el [item=planetaris-bioengineering-science-pack] tiene una vida útil limitada y no se puede almacenar en grandes cantidades. También, con patología vienen con el desafío añadido de que al degradarse enemigos aparecerán, por ejemplo [item=planetaris-pathological-science-pack] explotará en [entity=big-wasp].
tellus-bioassembler=[entity=planetaris-bioassembler] te permite creatar procesos tellurianos y nuevos materiales.\n[entity=planetaris-bioassembler] están vivos, necesitan ser plantados con [item=planetaris-bioassembler-seed] en cualquier suelo natural. Como todas las plantas [entity=planetaris-bioassembler] mueren, para revivirlos alimentáles con [item=nutrients] antes de que se descompongan.\n[entity=planetaris-bioassembler] pueden ser plantados por [entity=construction-robot].
tellus-roots=Tberias son facilmente corroíbles y maquinas teluurianas no pueden conectarse a [entity=pipe], necesitarás producir [entity=planetaris-root] para transportar tus fluídos. Puedes llenar tus raíces desde tuberías usando [entity=planetaris-root-filler]

